name: mini-heimdall

services:
  heimdall-db:
    container_name: "heimdall-db"
    image: "postgres"
    restart: always
    env_file:
      - ./static/environment/envs/db.env.example
    ports:
      - "1450:5432"

  heimdall: 
    container_name: heimdall
    image: rmenendez8/heimdall:v1.2.2
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    ports:
      - "1500:1500"
    volumes:
      - ./static/environment/config:/app/static/environment/config
      - ./vault:/app/vault
    depends_on:
      - heimdall-db
    env_file:
      - ./static/environment/envs/heimdall.env.example
    environment:
      CONFIG_PATH: /app/static/environment/config/dev/mini_basic_dataspace_authority.yaml
      RUST_BACKTRACE: 1
